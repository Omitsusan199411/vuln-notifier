name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/**"
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # github.workflow = ワークフロー名（name）、 github.ref = ブランチ名
  cancel-in-progress: true

jobs:
  audit:
    name: Vulunerability Audit(pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Run vulnerability audit
        run: pnpm audit --audit-level=high

  lint:
    name: Lint(Biome)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Start Lint
        run: pnpm lint

  test:
    name: Test(Vitest)
    env:
      CORS_ORIGIN: http://localhost:4000
      DATABASE_URL: postgresql://vuln:password@localhost:5432/vuln_test
    runs-on: ubuntu-latest
    needs: [audit, lint]
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: vuln
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vuln_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vuln -d vuln_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Start Test
        run: pnpm test:coverage
      - name: Get Current Date
        id: current-date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Tar Report
        run: tar -czf coverage-report-${{ steps.current-date.outputs.date }}.tar.gz coverage/
      - name: Coverage Report Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report # 成果物名
          path: coverage-report-${{ steps.current-date.outputs.date }}.tar.gz # アップロードするファイルパス
          if-no-files-found: error # 指定したパスにファイルが見つからない場合にエラーとする
          retention-days: 3

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: prisma generate
        run: pnpm --filter api exec prisma generate 
      - name: Start Build
        run: pnpm build
