name: API-WEB CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/**"
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # github.workflow = ワークフロー名（name）、 github.ref = ブランチ名
  cancel-in-progress: true

jobs:
  audit:
    name: Vulunerability Audit(pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Run vulnerability audit
        run: pnpm audit --audit-level=high

  lint:
    name: Lint(Biome)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Start Lint
        run: pnpm lint

  test:
    name: Test(Vitest)
    runs-on: ubuntu-latest
    needs: [audit, lint]
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Start Test
        run: pnpm test:coverage
      - name: Coverage Report Upload
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report # 成果物名
          path: | # アップロードするファイルパス
            coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Start Build
        run: pnpm build
