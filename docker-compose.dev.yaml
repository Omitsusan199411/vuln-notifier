x-db-common: &db-common
  image: postgres:18.1

services:
  db:
    <<: *db-common
    environment:
      POSTGRES_USER: vuln
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vuln_development
    ports:
      - "5480:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vuln -d vuln_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    <<: *db-common
    environment:
      POSTGRES_USER: vuln
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vuln_test
    ports:
      - "5481:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vuln -d vuln_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  workspace:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: workspace
    environment:
      CHOKIDAR_USEPOLLING: "true" # ファイルの変更で確実に検知し、HMRされるようにするため追加（vitestがchokidirでファイル変更がないかポーリングさせる）
    volumes:
      - ./:/root
    healthcheck:
      test: ["CMD", "turbo", "--version"] # pnpm install 完了後に turbo が実行可能になることで healthy と判定
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: api
    environment:
      DATABASE_URL: postgresql://vuln:password@db:5432/vuln_development
      TEST_DATABASE_URL: postgresql://vuln:password@db-test:5432/vuln_test
      CHOKIDAR_USEPOLLING: "true" # ファイルの変更で確実に検知し、HMRされるようにするため追加（tsxがchokidirにファイル変更がないかポーリングさせる）
      CORS_ORIGIN: http://localhost:4000
    ports:
      - "4001:3001"
    volumes:
      - ./packages/api:/root/packages/api # ソースコードの変更をコンテナにリアルタイム反映
      - ./node_modules:/root/node_modules # workspace が pnpm install で作った node_modules を共有
      - ./package.json:/root/package.json:ro # Corepack が packageManager フィールドを読み pnpm@10.33.2 を使用するため
      - ./pnpm-workspace.yaml:/root/pnpm-workspace.yaml:ro # catalog: 参照（@types/node 等）を解決するため
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/').then(res => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      db-test:
        condition: service_healthy
      workspace:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001
    ports:
      - "4000:3000"
    volumes:
      - ./packages/web:/root/packages/web # ソースコードの変更をコンテナにリアルタイム反映
      - ./node_modules:/root/node_modules # workspace が pnpm install で作った node_modules を共有
      - ./package.json:/root/package.json:ro # Corepack が packageManager フィールドを読み pnpm@10.33.2 を使用するため
      - ./pnpm-workspace.yaml:/root/pnpm-workspace.yaml:ro # catalog: 参照（@types/node 等）を解決するため
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_test_data:
